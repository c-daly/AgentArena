id: regular_expression_matching
title: Regular Expression Matching
description: "Given an input string s and a pattern p, implement regular expression\
  \ matching with support for '.' and '*' where:\n\n\t- '.' Matches any single character.\u200B\
  \u200B\u200B\u200B\n\n\t- '*' Matches zero or more of the preceding element.\n\n\
  Return a boolean indicating whether the matching covers the entire input string\
  \ (not partial).\n\n \n\nExample 1:\n\nInput: s = \"aa\", p = \"a\"\nOutput: false\n\
  Explanation: \"a\" does not match the entire string \"aa\".\n\nExample 2:\n\nInput:\
  \ s = \"aa\", p = \"a*\"\nOutput: true\nExplanation: '*' means zero or more of the\
  \ preceding element, 'a'. Therefore, by repeating 'a' once, it becomes \"aa\".\n\
  \nExample 3:\n\nInput: s = \"ab\", p = \".*\"\nOutput: true\nExplanation: \".*\"\
  \ means \"zero or more (*) of any character (.)\".\n\n \n\nConstraints:\n\n\t- 1\
  \ <= s.length <= 20\n\n\t- 1 <= p.length <= 20\n\n\t- s contains only lowercase\
  \ English letters.\n\n\t- p contains only lowercase English letters, '.', and '*'.\n\
  \n\t- It is guaranteed for each appearance of the character '*', there will be a\
  \ previous valid character to match."
difficulty: hard
source: leetcode
