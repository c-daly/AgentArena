id: longest_substring_without_repeating_characters
title: Longest Substring Without Repeating Characters
description: "Given a string s, find the length of the longest substring without duplicate\
  \ characters.\n\n \n\nExample 1:\n\nInput: s = \"abcabcbb\"\nOutput: 3\nExplanation:\
  \ The answer is \"abc\", with the length of 3. Note that \"bca\" and \"cab\" are\
  \ also correct answers.\n\nExample 2:\n\nInput: s = \"bbbbb\"\nOutput: 1\nExplanation:\
  \ The answer is \"b\", with the length of 1.\n\nExample 3:\n\nInput: s = \"pwwkew\"\
  \nOutput: 3\nExplanation: The answer is \"wke\", with the length of 3.\nNotice that\
  \ the answer must be a substring, \"pwke\" is a subsequence and not a substring.\n\
  \n \n\nConstraints:\n\n\t- 0 <= s.length <= 5 * 104\n\n\t- s consists of English\
  \ letters, digits, symbols and spaces."
difficulty: medium
source: leetcode
