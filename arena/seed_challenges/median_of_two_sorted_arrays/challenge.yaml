id: median_of_two_sorted_arrays
title: Median of Two Sorted Arrays
description: "Given two sorted arrays nums1 and nums2 of size m and n respectively,\
  \ return the median of the two sorted arrays.\n\nThe overall run time complexity\
  \ should be O(log (m+n)).\n\n \n\nExample 1:\n\nInput: nums1 = [1,3], nums2 = [2]\n\
  Output: 2.00000\nExplanation: merged array = [1,2,3] and median is 2.\n\nExample\
  \ 2:\n\nInput: nums1 = [1,2], nums2 = [3,4]\nOutput: 2.50000\nExplanation: merged\
  \ array = [1,2,3,4] and median is (2 + 3) / 2 = 2.5.\n\n \n\nConstraints:\n\n\t\
  - nums1.length == m\n\n\t- nums2.length == n\n\n\t- 0 <= m <= 1000\n\n\t- 0 <= n\
  \ <= 1000\n\n\t- 1 <= m + n <= 2000\n\n\t- -106 <= nums1[i], nums2[i] <= 106"
difficulty: hard
source: leetcode
